<!DOCTYPE>
<html>
    <head>
        <title>ADMISSION FORM</title>
        <link rel="stylesheet" href="style.css">

    </head>
    <body>
        <h1>ADMISSION FORM </h1>
        <form style="height: 1000px; width: 1000px;">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">    
            <br><br>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone">
            <br><br>
            <l
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">     
            <br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="0"    max="120">
            <br><br>
            <label for="qualification">Qualification:</label>
            <input type="text" id="qualification" name="qualification">     
            <br><br>
    

            <label for="marks">HSSLC TOTAL MARKS:</label>
            <input type="number" id="marks" name="marks" min="0" max="600">
            <br><br>

            <label for="SSLC">SSLC TOTAL MARKS:</label>
            <input type="number" id="SSLC" name="SSLC" min="0" max="500">
            <br><br>
            <label for="father_name">Father's Name:</label>
            <input type="text" id="father_name" name="father_name">
            <br><br>
            <label for="mother_name">Mother's Name:</label>
            <input type="text" id="mother_name" name="mother_name">
            <br><br>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male">   
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">   
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">   
            <label for="other">Other</label>    
            <br><br>
            <label for="nationality">   Nationality:</label>
            <input type="text" id="nationality" name="nationality">
            <br><br>
            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" cols="50"></textarea>
            <br><br>    
            <label for="course">Course:</label>
            <select id="course" name="course">
                <option value="Information Technology">IT</option>
                <option value="business_administration">Business Administration</option>
                <option value="psychology">Psychology</option>
                <option value="engineering">Engineering</option>
            </select>
            <br><br>
            <input type="submit" value="Submit">

        </form>
</html>
